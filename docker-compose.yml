services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mediot
      POSTGRES_USER: mediot
      POSTGRES_PASSWORD: mediot
    ports:
      - "5432:5432"
    volumes:
      - mediot_pg:/var/lib/postgresql/data

  control-plane:
    build:
      context: "./Control Plane"
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  gateway:
    build:
      context: "MedIoT/Gateway"
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8081:8081"
    depends_on:
      - control-plane

volumes:
  mediot_pg: